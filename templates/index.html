<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track, filter, and share Google BigQuery release notes and updates in real time.">
  <title>BigQuery Release Pulse — Real-time Cloud Analytics Updates</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
  <div class="app-container">
    <!-- Main App Header -->
    <header class="app-header">
      <div class="brand-wrapper">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </div>
        <h1 class="brand-title">BigQuery Release Pulse</h1>
      </div>
      <div class="header-controls">
        <div class="timestamp-info">
          <span>Last Checked</span>
          <strong id="last-updated-time">Checking...</strong>
        </div>
        <button id="refresh-trigger" class="refresh-btn">
          <svg id="refresh-icon-spin" class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="12" y1="18" x2="12" y2="22"></line>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
            <line x1="2" y1="12" x2="6" y2="12"></line>
            <line x1="18" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
          </svg>
          <svg id="refresh-icon-static" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
          <span>Refresh</span>
        </button>
      </div>
    </header>

    <!-- Dashboard Content -->
    <div class="dashboard-grid">
      <!-- Left Panel: Releases List -->
      <section class="glass-panel">
        <div class="panel-header">
          <h2 class="panel-title">BigQuery Updates</h2>
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search updates...">
          </div>
          <div class="filter-pills" id="filter-pills-container">
            <button class="filter-pill active" data-filter="All">All</button>
            <button class="filter-pill" data-filter="Feature">Features</button>
            <button class="filter-pill" data-filter="Announcement">Announcements</button>
            <button class="filter-pill" data-filter="Changed">Changed</button>
            <button class="filter-pill" data-filter="Issue">Issues</button>
            <button class="filter-pill" data-filter="Deprecated">Deprecated</button>
          </div>
        </div>
        <div class="panel-scroll-content" id="releases-list">
          <!-- Dynamically populated -->
          <div style="display:flex; justify-content:center; align-items:center; height:100%; color:var(--text-muted);">
            Fetching release feed...
          </div>
        </div>
      </section>

      <!-- Right Panel: Selection Detail -->
      <section class="glass-panel" id="detail-panel">
        <div class="detail-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <h3>No Update Selected</h3>
          <p>Click on any release card in the list to view full notes, inspect code additions, and draft a Tweet.</p>
        </div>
      </section>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/static/js/main.js"></script>
</body>
</html>
